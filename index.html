<div id="app">

let selectedCats = new Set(['noun','verb','letter']);
let learnTab = 'noun';
let quizQs = [], qIdx = 0, score = 0, answered = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderHome() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = Object.entries(DATA).map(([k,v]) => `
    <div class="cat-card${selectedCats.has(k)?' selected':''}" id="cat-${k}" onclick="toggleCat('${k}')" style="${selectedCats.has(k)?'border-color:'+v.color+';border-width:2px':''}">
      <div class="cat-icon">${v.icon}</div>
      <div class="cat-name" style="color:${v.color}">${v.name}</div>
      <div class="cat-desc">اِضْغَطْ لِلتَّعَلُّمِ وَالاِمْتِحَانِ</div>
    </div>
  `).join('');
}

function toggleCat(k) {
  if (selectedCats.has(k) && selectedCats.size === 1) return;
  if (selectedCats.has(k)) selectedCats.delete(k); else selectedCats.add(k);
  renderHome();
  document.getElementById('btn-start').disabled = selectedCats.size === 0;
}

function startLearn() {
  learnTab = [...selectedCats][0];
  renderLearn();
  showScreen('screen-learn');
}

function renderLearn() {
  const tabs = document.getElementById('learn-tabs');
  tabs.innerHTML = [...selectedCats].map(k => `
    <button class="tab${learnTab===k?' active':''}" onclick="setLearnTab('${k}')">${DATA[k].icon} ${DATA[k].name}</button>
  `).join('');
  const d = DATA[learnTab];
  const lc = document.getElementById('learn-content');
  let html = `
    <div class="learn-card" style="border-top: 4px solid ${d.color}">
      <div class="learn-card-title" style="color:${d.color}">${d.icon} تَعْرِيفُ ${d.name}</div>
      <div class="learn-card-def">${d.def}</div>
      <div class="visual-box" style="background:${d.bg};border:0.5px solid ${d.borderColor}">
        <div class="big-word" style="color:${d.color}">${d.visual.word}</div>
        <div class="label" style="color:${d.color};opacity:.8">${d.visual.note}</div>
      </div>
    </div>
    <div class="learn-card">
      <div class="learn-card-title">🔖 عَلَامَاتُ ${d.name}</div>
      <div class="signs-list">${d.signs.map(s=>`<span class="sign-pill" style="background:${s.color};border-color:${s.border};color:${s.textColor}">${s.text}</span>`).join('')}</div>
    </div>
  `;
  if (d.types) {
    html += `<div class="learn-card"><div class="learn-card-title">📋 أَقْسَامُ ${d.name}</div>`;
    d.types.forEach(t => {
      html += `<div style="padding:.6rem 0;border-bottom:0.5px solid var(--color-border-tertiary)">
        <div style="font-weight:700;color:${d.color};font-size:15px">${t.name}</div>
        <div style="font-size:14px;color:var(--color-text-secondary);margin-top:3px">${t.ex}</div>
        ${t.note?`<div style="font-size:12px;color:var(--color-text-secondary);margin-top:2px">${t.note}</div>`:''}
      </div>`;
    });
    html += `</div>`;
  }
  html += `<div class="learn-card">
    <div class="learn-card-title">✏️ أَمْثِلَةٌ عَلَى ${d.name}</div>
    <div class="examples-row">${d.examples.map(e=>`<span class="example-chip" style="background:${d.bg};border-color:${d.borderColor};color:${d.color}">${e}</span>`).join('')}</div>
  </div>`;
  lc.innerHTML = html;
}

function setLearnTab(k) {
  learnTab = k;
  renderLearn();
}

function startQuiz() {
  const pool = QUESTIONS.filter(q => selectedCats.has(q.ans));
  quizQs = shuffle(pool).slice(0, Math.min(10, pool.length));
  qIdx = 0; score = 0; answered = false;
  showScreen('screen-quiz');
  renderQuestion();
}

function shuffle(a) { return [...a].sort(() => Math.random() - .5); }

function renderQuestion() {
  const q = quizQs[qIdx];
  const total = quizQs.length;
  document.getElementById('q-progress').textContent = `سُؤَالٌ ${toArabicNum(qIdx+1)} مِنْ ${toArabicNum(total)}`;
  document.getElementById('q-score').textContent = `النَّتِيجَةُ: ${toArabicNum(score)}`;
  document.getElementById('q-bar').style.width = ((qIdx/total)*100)+'%';
  document.getElementById('q-feedback').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';
  answered = false;

  const card = document.getElementById('q-card');
  const w = q.word ? `<div class="question-text" style="font-size:28px;color:#533AB7;margin-bottom:.4rem">${q.word}</div>` : '';
  card.innerHTML = `
    <div class="question-type">❓ نَوْعُ الْكَلِمَةِ</div>
    ${w}
    <div class="question-text">${q.q}</div>
    <div class="question-hint" style="margin-top:.4rem">💡 ${q.hint}</div>
  `;

  const optsEl = document.getElementById('q-options');
  if (q.special === 'signs') {
    optsEl.style.gridTemplateColumns = '1fr';
    optsEl.innerHTML = SIGNS_Q.choices.map((c,i) => `
      <button class="option-btn" id="signs-opt-${i}" onclick="answerSigns(${i},${c.correct})">${c.text}</button>
    `).join('');
  } else {
    optsEl.style.gridTemplateColumns = '1fr 1fr';
    const opts = shuffle(q.opts);
    optsEl.innerHTML = opts.map(k => `
      <button class="option-btn" id="opt-${k}" onclick="answer('${k}','${q.ans}')">${DATA[k].icon} ${DATA[k].name}</button>
    `).join('');
  }
}

function answer(chosen, correct) {
  if (answered) return;
  answered = true;
  const isRight = chosen === correct;
  if (isRight) score++;
  const q = quizQs[qIdx];
  const d = DATA[correct];
  
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  const chosenBtn = document.getElementById('opt-'+chosen);
  const correctBtn = document.getElementById('opt-'+correct);
  
  if (isRight) {
    chosenBtn.classList.add('correct');
  } else {
    chosenBtn.classList.add('wrong');
    if (correctBtn) correctBtn.classList.add('reveal');
  }

  showFeedback(isRight, d, isRight
    ? `أَحْسَنْتَ! «${q.word||q.q.match(/«(.+?)»/)?.[1]||''}» ${d.name} لأَنَّهَا ${d.signs[0].text}.`
    : `الْجَوَابُ الصَّحِيحُ هُوَ «${d.name}». ${d.signs[0].text} مِنْ عَلَامَاتِهِ.`
  );
}

function answerSigns(idx, isCorrect) {
  if (answered) return;
  answered = true;
  if (isCorrect) score++;
  document.querySelectorAll('.option-btn').forEach((b,i) => {
    b.disabled = true;
    const c = SIGNS_Q.choices[i];
    if (c.correct) b.classList.add(isCorrect && i===idx ? 'correct' : 'reveal');
    else if (i === idx && !isCorrect) b.classList.add('wrong');
  });
  showFeedback(isCorrect, DATA['noun'], isCorrect
    ? 'أَحْسَنْتَ! قَبُولُ (أَلْ) وَالتَّنْوِينُ عَلَامَتَانِ مِنْ عَلَامَاتِ الِاسْمِ.'
    : 'عَلَامَاتُ الِاسْمِ هِيَ: قَبُولُ (أَلْ)، وَالتَّنْوِينُ، وَالْجَرُّ، وَدُخُولُ حُرُوفِ الْجَرِّ.'
  );
}

function showFeedback(isRight, d, msg) {
  const fb = document.getElementById('q-feedback');
  fb.style.display = 'block';
  fb.className = 'feedback-box ' + (isRight ? 'correct' : 'wrong');
  fb.innerHTML = `<strong>${isRight ? '✅ صَوَابٌ!' : '❌ خَطَأٌ!'}</strong> ${msg}`;
  document.getElementById('q-score').textContent = `النَّتِيجَةُ: ${toArabicNum(score)}`;
  document.getElementById('btn-next').style.display = 'block';
  document.getElementById('btn-next').textContent = qIdx < quizQs.length - 1 ? 'التَّالِي ←' : 'النَّتِيجَةُ الْنِّهَائِيَّةُ ←';
}

function nextQuestion() {
  qIdx++;
  if (qIdx >= quizQs.length) showResult();
  else renderQuestion();
}

function showResult() {
  const total = quizQs.length;
  const pct = Math.round((score/total)*100);
  const emojis = pct>=90?'🏆':pct>=70?'🎉':pct>=50?'😊':'💪';
  const titles = pct>=90?'مُمْتَازٌ!':pct>=70?'أَحْسَنْتَ جِدًّا!':pct>=50?'جَيِّدٌ!':'حَاوِلْ مَرَّةً أُخْرَى!';
  const msgs = pct>=90?'أَنْتَ نَجْمٌ فِي النَّحْوِ الْعَرَبِيِّ! 🌟':pct>=70?'أَدَاءٌ رَائِعٌ، وَاصِلِ التَّعَلُّمَ!':pct>=50?'جَيِّدٌ، يُمْكِنُكَ التَّحَسُّنُ بِالتَّدْرِيبِ.':'لَا تَيْأَسْ، رَاجِعِ الدُّرُوسَ وَحَاوِلْ!';
  document.getElementById('res-emoji').textContent = emojis;
  document.getElementById('res-title').textContent = titles;
  document.getElementById('res-score').textContent = `${toArabicNum(score)}/${toArabicNum(total)}`;
  document.getElementById('res-msg').textContent = msgs;
  document.getElementById('rb-correct').textContent = toArabicNum(score);
  document.getElementById('rb-wrong').textContent = toArabicNum(total-score);
  document.getElementById('rb-pct').textContent = toArabicNum(pct)+'٪';
  document.getElementById('q-bar').style.width = '100%';
  showScreen('screen-result');
}

renderHome();
document.getElementById('btn-start').disabled = false;
</script>
